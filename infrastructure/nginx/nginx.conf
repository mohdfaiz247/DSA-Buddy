worker_processes auto;

events {
  worker_connections 4096;
}

http {
  include /etc/nginx/conf.d/*.conf;

  upstream api_gateway_ws {
    server api-gateway:3000;
  }

  upstream auth_svc       { server auth-service:8000; }
  upstream progress_svc   { server progress-service:8001; }
  upstream scheduler_svc  { server scheduler-service:8002; }
  upstream analytics_svc  { server analytics-service:8003; }
  upstream hint_svc       { server hint-service:8004; }
  upstream ai_svc         { server ai-agent-service:8005; }
  upstream problem_svc    { server problem-service:8006; }

  server {
    listen 80;

    # WebSocket upgrade
    location /ws/ {
      proxy_pass http://api_gateway_ws;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 86400s;
    }

    location /api/auth/     { proxy_pass http://auth_svc/; }
    location /api/progress/ { proxy_pass http://progress_svc/; }
    location /api/schedule/ { proxy_pass http://scheduler_svc/; }
    location /api/analytics/{ proxy_pass http://analytics_svc/; }
    location /api/hints/    { proxy_pass http://hint_svc/; }
    location /api/ai/       { proxy_pass http://ai_svc/; }
    location /api/problems/ { proxy_pass http://problem_svc/; }
  }
}
